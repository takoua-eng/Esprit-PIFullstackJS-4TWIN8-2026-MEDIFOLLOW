groups:
  - name: medifollow-alerts
    rules:
      # Backend down
      - alert: BackendDown
        expr: up{job="medifollow-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MediFollow Backend is down"
          description: "The backend service has been unreachable for more than 1 minute."

      # Frontend down
      - alert: FrontendDown
        expr: up{job="medifollow-frontend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MediFollow Frontend is down"
          description: "The frontend service has been unreachable for more than 1 minute."

      # High CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for more than 5 minutes on {{ $labels.instance }}."

      # High memory usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 85% on {{ $labels.instance }}."

      # Disk space low
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 15% on {{ $labels.instance }}."
