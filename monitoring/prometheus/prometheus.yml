global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alert.rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Backend NestJS app
  - job_name: 'medifollow-backend'
    static_configs:
      - targets: ['backend:3000']
    metrics_path: '/metrics'

  # Frontend nginx
  - job_name: 'medifollow-frontend'
    static_configs:
      - targets: ['frontend:80']
    metrics_path: '/metrics'
