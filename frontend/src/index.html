<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MediFollow</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="mat-typography">
  <div id="google_translate_element" style="display:none;visibility:hidden;position:absolute;top:-9999px"></div>
  <app-root translate="yes"></app-root>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,fr,ar',
        autoDisplay: false
      }, 'google_translate_element');
    }

    window.triggerGoogleTranslate = function(lang) {
      var attempt = 0;
      var tryTranslate = function() {
        var select = document.querySelector('.goog-te-combo');
        if (select) {
          select.value = lang;
          select.dispatchEvent(new Event('change'));
          var hide = function() {
            var bar = document.querySelector('.goog-te-banner-frame');
            if (bar) bar.style.cssText = 'display:none!important;height:0!important';
            if (document.body.style.top && document.body.style.top !== '0px') {
              document.body.style.top = '0px';
            }
          };
          hide(); setTimeout(hide, 200); setTimeout(hide, 600); setTimeout(hide, 1200);
        } else if (attempt < 20) {
          attempt++;
          setTimeout(tryTranslate, 300);
        }
      };
      tryTranslate();
    };

    document.addEventListener('DOMContentLoaded', function() {
      var obs = new MutationObserver(function() {
        var bar = document.querySelector('.goog-te-banner-frame');
        if (bar) bar.style.cssText = 'display:none!important;height:0!important';
        if (document.body.style.top && document.body.style.top !== '0px') {
          document.body.style.top = '0px';
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });
    });
  </script>
  <script type="text/javascript"
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
  </script>
</body>
</html>
