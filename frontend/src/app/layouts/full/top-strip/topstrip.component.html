<div class="app-topstrip text-white p-y-8 p-x-24 w-100 d-flex align-items-center justify-content-between"
  style="background-color: #468ecf; min-height: 60px;">

  <!-- Left: Toggle + Logo -->
  <div class="d-flex align-items-center gap-12">
    <button mat-icon-button class="text-white" (click)="toggleNav.emit()" *ngIf="showToggle" aria-label="Toggle navigation">
      <i-tabler name="menu-2" class="icon-20 d-flex"></i-tabler>
    </button>
    <img src="assets/images/medifollow-logo.png" alt="MediFollow" height="36" />
  </div>

  <!-- Right: Language + Contrast + Notification + Profile -->
  <div class="d-flex align-items-center gap-8">

    <!-- Language -->
    <button mat-stroked-button [matMenuTriggerFor]="langMenu" class="f-s-12 text-white" style="border-color:rgba(255,255,255,.5)">
      {{ 'LANGUAGE' | translate }}: {{ selectedLanguage | uppercase }}
    </button>
    <mat-menu #langMenu="matMenu">
      <button mat-menu-item *ngFor="let lang of availableLanguages" (click)="changeLanguage(lang.code)">
        {{ lang.label }}
      </button>
    </mat-menu>

    <!-- High Contrast -->
    <button mat-stroked-button class="f-s-12 text-white" style="border-color:rgba(255,255,255,.5)" (click)="toggleHighContrast()">
      {{ highContrastEnabled ? ('DISABLE_HIGH_CONTRAST' | translate) : ('ENABLE_HIGH_CONTRAST' | translate) }}
    </button>

    <!-- Notification Bell: Pour Patient -> navigate to alerts, Pour autres -> notification panel -->
    <!-- Version Patient: Naviguer vers alerts -->
    <button *ngIf="isPatient()" mat-icon-button (click)="goToAlerts()" class="text-white position-relative" matTooltip="Mes Alertes" style="width: 44px; height: 44px;" aria-label="Open alerts">
      <div class="d-flex align-items-center justify-content-center rounded-circle w-100 h-100" style="transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
        <i-tabler name="bell" class="icon-22"></i-tabler>
      </div>
      <span *ngIf="unreadCount > 0"
        class="position-absolute d-flex align-items-center justify-content-center rounded-circle shadow-sm"
        style="top: 4px; right: 4px; background: #ff4757; color: #fff; width: 18px; height: 18px; font-size: 10px; font-weight: 700; border: 2px solid #468ecf;">
        {{ unreadCount > 9 ? '9+' : unreadCount }}
      </span>
    </button>

    <!-- Version autres rôles: Panel Notifications -->
    <button *ngIf="!isPatient()" mat-icon-button [matMenuTriggerFor]="notifMenu" class="text-white position-relative" matTooltip="Notifications" style="width: 44px; height: 44px;" aria-label="Open notifications">
      <div class="d-flex align-items-center justify-content-center rounded-circle w-100 h-100" style="transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
        <i-tabler name="bell" class="icon-22"></i-tabler>
      </div>
      <span *ngIf="unreadCount > 0"
        class="position-absolute d-flex align-items-center justify-content-center rounded-circle shadow-sm"
        style="top: 4px; right: 4px; background: #ff4757; color: #fff; width: 18px; height: 18px; font-size: 10px; font-weight: 700; border: 2px solid #468ecf;">
        {{ unreadCount > 9 ? '9+' : unreadCount }}
      </span>
    </button>

    <mat-menu #notifMenu="matMenu" xPosition="before" class="notif-menu" panelClass="premium-menu-panel">
      <!-- Header -->
      <div class="d-flex align-items-center justify-content-between p-x-20 p-y-16" style="border-bottom: 1px solid rgba(0,0,0,0.05); min-width: 360px; background: #fff;">
        <div class="d-flex align-items-center gap-8">
          <h6 class="m-0 f-w-600 f-s-16 text-dark">Notifications</h6>
          <span *ngIf="unreadCount > 0" class="d-inline-flex align-items-center justify-content-center rounded-circle" style="width:22px;height:22px;background:#468ecf;color:#fff;font-size:11px;font-weight:700;">
            {{ unreadCount > 9 ? '9+' : unreadCount }}
          </span>
        </div>
        <button mat-button class="text-primary p-0 f-s-13 f-w-500" style="min-width: auto; line-height: 1;" (click)="markAllRead(); $event.stopPropagation()">
          <i-tabler name="checks" class="icon-16 m-r-4 align-middle"></i-tabler>
          <span class="align-middle">Tout lire</span>
        </button>
      </div>

      <!-- Notifications List -->
      <div style="max-height: 340px; overflow-y: auto;" class="p-8">

        <!-- Unread -->
        <ng-container *ngIf="unreadNotifs.length > 0">
          <div class="p-x-12 p-y-6 f-s-11 f-w-700 text-muted text-uppercase" style="letter-spacing: 0.8px;" (click)="$event.stopPropagation()">Récents</div>

          <div *ngFor="let n of unreadNotifs" class="d-flex align-items-start p-12 m-b-4 rounded-2" style="transition: background 0.2s; cursor: pointer; background: rgba(70,142,207,0.05); border-left: 3px solid #468ecf;" (click)="markRead(n); $event.stopPropagation()">
            <div class="d-flex align-items-center justify-content-center rounded-2 m-r-12 flex-shrink-0" [ngStyle]="{'background': n.type === 'alert' ? 'rgba(214,48,49,0.1)' : 'rgba(70,142,207,0.1)', 'color': n.type === 'alert' ? '#d63031' : '#468ecf', 'width': '38px', 'height': '38px'}">
              <i-tabler [name]="getTypeIcon(n.type)" class="icon-18 d-flex"></i-tabler>
            </div>
            <div class="flex-grow-1" style="min-width:0;">
              <div class="f-w-600 f-s-13 text-dark" style="line-height:1.3;margin-bottom:2px;">{{ n.title }}</div>
              <div class="f-s-12 text-muted" style="line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">{{ n.message }}</div>
              <div class="f-s-11 text-muted d-flex align-items-center m-t-4">
                <i-tabler name="clock" class="icon-12 m-r-4"></i-tabler> {{ timeAgo(n.createdAt) }}
              </div>
            </div>
            <span class="d-block rounded-circle flex-shrink-0 m-l-8 m-t-4" style="width:8px;height:8px;background:#468ecf;"></span>
          </div>
        </ng-container>

        <!-- Empty State -->
        <div *ngIf="notifications.length === 0" class="d-flex flex-column align-items-center justify-content-center p-y-32 text-muted" (click)="$event.stopPropagation()">
          <i-tabler name="bell-off" class="icon-36 m-b-12" style="color:#adb5bd;"></i-tabler>
          <span class="f-s-13">Aucune notification</span>
        </div>

      </div>

      <!-- Footer -->
      <div style="border-top: 1px solid rgba(0,0,0,0.06); padding: 10px 16px;" (click)="$event.stopPropagation()">
        <button mat-button class="w-100 f-s-13 f-w-500" style="color:#468ecf; justify-content:center;" (click)="goToAllNotifications()">
          <i-tabler name="list" class="icon-16 m-r-6 align-middle"></i-tabler>
          <span class="align-middle">Voir toutes les notifications</span>
        </button>
      </div>

    </mat-menu>

    <!-- Profile -->
    <button mat-icon-button [matMenuTriggerFor]="profileMenu" class="text-white" aria-label="Open profile menu">
      <img *ngIf="userAvatar" [src]="userAvatar" class="rounded-circle object-cover d-block" width="32" height="32" style="border:2px solid rgba(255,255,255,.5)" alt="{{ currentUserData.firstName ? (currentUserData.firstName + (currentUserData.lastName ? ' ' + currentUserData.lastName : '')) : (userEmail || 'Profile') }}" />
      <div *ngIf="!userAvatar" class="rounded-circle d-flex align-items-center justify-content-center" style="width: 32px; height: 32px; border:2px solid rgba(255,255,255,.5); background: linear-gradient(135deg, #468ecf 0%, #1e40af 100%); color: white; font-size: 14px; font-weight: 700; text-transform: uppercase;">
        {{ userInitials }}
      </div>
    </button>

    <mat-menu #profileMenu="matMenu" xPosition="before" class="profile-menu" panelClass="premium-menu-panel">
      <div class="d-flex align-items-center p-x-20 p-y-16" style="background: linear-gradient(145deg, #f8f9fa, #e9ecef); border-bottom: 1px solid rgba(0,0,0,0.05); min-width: 250px;">
        <img *ngIf="userAvatar" [src]="userAvatar" class="rounded-circle shadow-sm m-r-16" width="50" height="50" style="border: 2px solid #fff;" alt="{{ currentUserData.firstName ? (currentUserData.firstName + (currentUserData.lastName ? ' ' + currentUserData.lastName : '')) : (userEmail || 'Profile') }}" />
        <div *ngIf="!userAvatar" class="rounded-circle shadow-sm m-r-16 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px; border: 2px solid #fff; background: linear-gradient(135deg, #468ecf 0%, #1e40af 100%); color: white; font-size: 20px; font-weight: 700; text-transform: uppercase;">
          {{ userInitials }}
        </div>
        <div>
          <h6 class="m-0 f-w-600 f-s-16 text-dark" style="letter-spacing: 0.5px;">{{ userRole }}</h6>
          <span class="text-muted f-s-13">{{ userEmail }}</span>
        </div>
      </div>
      <div class="p-8">
        <button mat-menu-item (click)="goToProfile()" class="rounded d-flex align-items-center m-b-4" style="height: 48px; transition: all 0.3s ease;">
          <div class="d-flex align-items-center justify-content-center rounded-circle m-r-12" style="width: 36px; height: 36px; background: rgba(70, 142, 207, 0.1); color: #468ecf;">
            <i-tabler name="user" class="icon-20"></i-tabler>
          </div>
          <span class="f-w-500 f-s-14 text-dark">Mon Profil</span>
        </button>
        <mat-divider class="m-y-4"></mat-divider>
        <button mat-menu-item (click)="logout()" class="rounded d-flex align-items-center m-t-4" style="height: 48px; transition: all 0.3s ease;">
          <div class="d-flex align-items-center justify-content-center rounded-circle m-r-12" style="width: 36px; height: 36px; background: rgba(214, 48, 49, 0.1); color: #d63031;">
            <i-tabler name="logout" class="icon-20"></i-tabler>
          </div>
          <span class="f-w-500 f-s-14" style="color: #d63031;">Déconnexion</span>
        </button>
      </div>
    </mat-menu>

  </div>
</div>
