<!-- Skip navigation -->
<a href="#main-content" class="skip-nav-link">
  Skip to main content
</a>

<app-topstrip></app-topstrip>

<!-- Guide clavier -->
<app-keyboard-guide></app-keyboard-guide>

<mat-sidenav-container
  class="mainWrapper blue_theme light-theme"
  autosize
  autoFocus
  dir="ltr"
>

  <!-- Sidebar -->
  <mat-sidenav
    #leftsidenav
    [mode]="isOver ? 'over' : 'side'"
    [opened]="!isOver"
    (openedChange)="onSidenavOpenedChange($event)"
    (closedStart)="onSidenavClosedStart()"
    class="sidebarNav"
  >
    <div class="flex-layout">
      <app-sidebar
        (toggleMobileNav)="sidenav.toggle()"
        [showToggle]="isOver"
      ></app-sidebar>

      <ng-scrollbar class="position-relative" style="height: 100%">
        <mat-nav-list class="sidebar-list">
          @for (item of navItems; track item) {
            <app-nav-item
              [item]="item"
              (notify)="sidenav.toggle()"
            ></app-nav-item>
          }
        </mat-nav-list>
      </ng-scrollbar>
    </div>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content class="contentWrapper" #content>
    <main class="pageWrapper maxWidth" id="main-content" tabindex="-1">
      <app-header
        [showToggle]="!isOver"
        (toggleMobileNav)="sidenav.toggle()"
      ></app-header>

      <div class="m-t-30">
        <router-outlet></router-outlet>
      </div>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>

<!-- ✅ Garder TON feature -->
<app-voice-assistant></app-voice-assistant>
