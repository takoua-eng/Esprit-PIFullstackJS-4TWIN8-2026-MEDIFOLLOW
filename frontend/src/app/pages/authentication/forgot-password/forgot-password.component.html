<div class="forgot-container">

  <div class="forgot-card">

    <!-- LEFT IMAGE -->
    <div class="left-side">
      <img src="assets/images/login.png" alt="illustration" />
    </div>

    <!-- RIGHT FORM -->
    <div class="right-side">

      <h2>Forgot your password?</h2>

      <p class="subtitle" *ngIf="step === 1">
        Please enter the email address associated with your account and we will email you a code to reset your password.
      </p>

      <p class="subtitle" *ngIf="step === 2">
        Enter the 6-digit verification code you received and your new password.
      </p>

      <!-- STEP 1: Email Form -->
      <form *ngIf="step === 1" [formGroup]="forgotForm" (ngSubmit)="submit()">

        <label>Email Address</label>
        <input
          type="email"
          formControlName="email"
          placeholder="admin@gmail.com"
          class="custom-input"
        />

        <button type="submit" class="primary-btn" [disabled]="forgotForm.invalid || isLoading">
          {{ isLoading ? 'Sending...' : 'Send Reset Code' }}
        </button>

        <button
          type="button"
          routerLink="/authentication/login"
          class="outline-btn"
        >
          Back to Login
        </button>

      </form>

      <!-- STEP 2: Code and New Password Form -->
      <form *ngIf="step === 2" [formGroup]="resetForm" (ngSubmit)="submitReset()">
        
        <p class="subtitle" style="margin-top: -10px; margin-bottom: 20px; font-weight: bold;">
          A verification code was sent to {{ userEmail }}.
        </p>

        <label>Verification Code</label>
        <input
          type="text"
          formControlName="code"
          placeholder="e.g. 123456"
          class="custom-input"
        />

        <label style="margin-top: 15px; display: block;">New Password</label>
        <input
          type="password"
          formControlName="newPassword"
          placeholder="New password"
          class="custom-input"
        />

        <button type="submit" class="primary-btn m-t-20" [disabled]="resetForm.invalid || isLoading">
          {{ isLoading ? 'Verifying...' : 'Reset Password' }}
        </button>

        <button
          type="button"
          (click)="step = 1; message = ''"
          class="outline-btn"
        >
          Resend email / Change email
        </button>

      </form>

      <!-- Message Feedback -->
      <p *ngIf="message" class="feedback-message m-t-16">{{ message }}</p>

    </div>

  </div>

</div>
