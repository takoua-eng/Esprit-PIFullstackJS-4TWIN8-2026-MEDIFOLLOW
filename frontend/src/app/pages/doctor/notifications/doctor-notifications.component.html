<div class="notif-page">

  <!-- Header -->
  <div class="notif-page-header">
    <button class="back-btn" (click)="goBack()">
      <i-tabler name="arrow-left" class="icon-20"></i-tabler>
    </button>
    <div class="notif-page-title">
      <i-tabler name="bell" class="icon-24"></i-tabler>
      <div>
        <h1>Notifications</h1>
        <p>{{ unreadCount }} non lue{{ unreadCount > 1 ? 's' : '' }}</p>
      </div>
    </div>
    <button *ngIf="unreadCount > 0" class="mark-all-btn" (click)="markAllRead()">
      <i-tabler name="checks" class="icon-16"></i-tabler>
      Tout marquer comme lu
    </button>
  </div>

  <!-- Filters -->
  <div class="notif-filters">
    <button class="filter-btn" [class.active]="activeFilter === 'all'" (click)="activeFilter = 'all'">
      Toutes <span class="filter-count">{{ notifications.length }}</span>
    </button>
    <button class="filter-btn" [class.active]="activeFilter === 'unread'" (click)="activeFilter = 'unread'">
      Non lues <span class="filter-count unread">{{ unreadCount }}</span>
    </button>
    <button class="filter-btn" [class.active]="activeFilter === 'read'" (click)="activeFilter = 'read'">
      Lues <span class="filter-count">{{ notifications.length - unreadCount }}</span>
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="notif-loading">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Chargement...</p>
  </div>

  <!-- List -->
  <div *ngIf="!loading" class="notif-list">

    <div *ngIf="filtered.length === 0" class="notif-empty">
      <i-tabler name="bell-off" class="icon-48"></i-tabler>
      <p>Aucune notification</p>
    </div>

    <div *ngFor="let n of filtered"
         class="notif-item"
         [class.unread]="!n.isRead"
         (click)="markRead(n)">

      <div class="notif-icon" [style.background]="getTypeColor(n.type) + '18'" [style.color]="getTypeColor(n.type)">
        <i-tabler [name]="getTypeIcon(n.type)" class="icon-22"></i-tabler>
      </div>

      <div class="notif-body">
        <div class="notif-title">{{ n.title }}</div>
        <div class="notif-msg">{{ n.message }}</div>
        <div class="notif-time">
          <i-tabler name="clock" class="icon-13"></i-tabler>
          {{ timeAgo(n.createdAt) }}
        </div>
      </div>

      <div class="notif-dot" *ngIf="!n.isRead"></div>
    </div>

  </div>

</div>
