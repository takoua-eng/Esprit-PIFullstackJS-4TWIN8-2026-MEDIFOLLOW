<mat-toolbar class="topbar gap-10">

  <!-- Mobile Menu -->
  <button *ngIf="showToggle" mat-icon-button (click)="toggleMobileNav.emit()"
    class="d-flex d-md-none justify-content-center">
    <i-tabler name="menu-2" class="icon-20 d-flex"></i-tabler>
  </button>

  <!-- Logo MediFlow -->
  <div class="branding d-flex align-items-center">
    <img src="assets/images/medifollow-logo.png" alt="MediFlow" height="36" />
  </div>

  <span class="flex-1-auto"></span>

  <!-- 🔔 NOTIFICATION BELL -->
  <button mat-icon-button [matMenuTriggerFor]="notifMenu" aria-label="Notifications">
    <span class="bell-wrapper">
      <i-tabler name="bell" class="icon-20 d-flex"></i-tabler>
      <span *ngIf="unreadCount > 0" class="notif-badge">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
    </span>
  </button>

  <mat-menu #notifMenu="matMenu" xPosition="before" class="notif-panel">
    <div class="np-header" (click)="$event.stopPropagation()">
      <span class="np-title">Notifications</span>
      <button mat-button class="np-mark-all" (click)="markAllRead()">
        <i-tabler name="checks" class="icon-14 m-r-4"></i-tabler>
        Tout lire
      </button>
    </div>

    <ng-container *ngIf="unreadNotifs.length > 0">
      <div class="np-section-label" (click)="$event.stopPropagation()">UNREAD</div>
      <div *ngFor="let n of unreadNotifs" class="np-item np-unread" (click)="markRead(n)">
        <div class="np-avatar" [ngClass]="'type-' + n.type">
          <i-tabler [name]="getTypeIcon(n.type)" class="icon-18 d-flex"></i-tabler>
        </div>
        <div class="np-content">
          <div class="np-msg"><strong>{{ n.title }}</strong> {{ n.message }}</div>
          <div class="np-meta">{{ timeAgo(n.createdAt) }}</div>
        </div>
      </div>
    </ng-container>

    <ng-container *ngIf="readNotifs.length > 0">
      <div class="np-section-label" (click)="$event.stopPropagation()">READ</div>
      <div *ngFor="let n of readNotifs" class="np-item" (click)="$event.stopPropagation()">
        <div class="np-avatar np-avatar-read" [ngClass]="'type-' + n.type">
          <i-tabler [name]="getTypeIcon(n.type)" class="icon-18 d-flex"></i-tabler>
        </div>
        <div class="np-content">
          <div class="np-msg np-msg-read"><strong>{{ n.title }}</strong> {{ n.message }}</div>
          <div class="np-meta">{{ timeAgo(n.createdAt) }}</div>
        </div>
      </div>
    </ng-container>

    <div *ngIf="notifications.length === 0" class="np-empty" (click)="$event.stopPropagation()">
      <i-tabler name="bell-off" class="icon-24" style="opacity:.4"></i-tabler>
      <p>Aucune notification pour le moment</p>
    </div>
  </mat-menu>

  <!-- Profile menu -->
  <button mat-icon-button [matMenuTriggerFor]="profileMenu" aria-label="User menu">
    <img src="/assets/images/profile/user-1.jpg" class="rounded-circle object-cover d-block" width="35" />
  </button>

  <mat-menu #profileMenu="matMenu" xPosition="before">
    <div class="px-4 py-2">
      <div class="f-w-600">{{ 'APP_NAME' | translate }}</div>
      <div class="text-muted f-s-12">Super Administrator</div>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="goToProfile()">
      <i-tabler name="user" class="icon-16 m-r-8"></i-tabler>
      <span>{{ 'PROFILE' | translate }}</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
      <i-tabler name="logout" class="icon-16 m-r-8"></i-tabler>
      <span>{{ 'LOGOUT' | translate }}</span>
    </button>
  </mat-menu>

</mat-toolbar>
