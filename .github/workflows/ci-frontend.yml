name: CI Frontend

on:
  push:
    branches: [main, coordinator3, final-patient]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build Angular application
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  test:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Install Chrome for tests
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Run all Angular tests
        working-directory: frontend
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
        env:
          CI: true
          CHROME_BIN: /usr/bin/chromium-browser

      - name: Ensure coverage directory exists
        if: always()
        working-directory: frontend
        run: |
          mkdir -p coverage
          echo "Coverage placeholder" > coverage/.placeholder

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  analyze:
    name: Code Analysis - Sonar
    runs-on: ubuntu-latest
    needs: test
    if: always() && needs.test.result != 'cancelled'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          pattern: frontend-coverage
          path: frontend/coverage/
          merge-multiple: true

      - name: Ensure coverage directory exists
        run: mkdir -p frontend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
