name: CI Backend

on:
  push:
    branches: [main, coordinator3]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      # Tests coordinator — BLOQUANTS (doivent passer)
      - name: Run coordinator unit tests
        working-directory: backend
        run: npx jest --testPathPattern=coordinator --coverage --coverageDirectory=coverage --passWithNoTests
        env:
          NODE_ENV: test

      # Tous les autres tests — NON BLOQUANTS (ignorés si ils échouent)
      - name: Run all other tests (non-blocking)
        working-directory: backend
        run: npx jest --testPathPattern="^(?!.*coordinator).*" --passWithNoTests || true
        env:
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
