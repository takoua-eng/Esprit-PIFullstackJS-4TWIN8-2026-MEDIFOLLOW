apiVersion: apps/v1
kind: Deployment
metadata:
  name: medifolllow-backend
  namespace: default
  labels:
    app: medifolllow-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medifolllow-backend
  template:
    metadata:
      labels:
        app: medifolllow-backend
    spec:
      containers:
        - name: backend
          image: takouanaceur/medifolllow-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: medifolllow-secrets
                  key: MONGODB_URI
            - name: GMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: medifolllow-secrets
                  key: GMAIL_USER
            - name: GMAIL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medifolllow-secrets
                  key: GMAIL_APP_PASSWORD
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: medifolllow-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: medifolllow-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: medifolllow-secrets
                  key: TWILIO_PHONE_NUMBER
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: medifolllow-secrets
                  key: OPENAI_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: medifolllow-backend-service
  namespace: default
spec:
  selector:
    app: medifolllow-backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP


